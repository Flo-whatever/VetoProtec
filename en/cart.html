<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cart — VetoProtec</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    body {
      background:
        radial-gradient(900px 600px at 80% 0%, rgba(192,132,200,.15) 0%, transparent 60%),
        var(--bg);
    }
    .cart-wrap { max-width: 600px; margin: 60px auto; padding: 0 24px; }
    .cart-title { font-family: 'DM Serif Display', serif; font-size: 32px; margin-bottom: 8px; }
    .cart-empty { color: var(--muted); font-weight: 300; margin: 40px 0; text-align: center; }

    .cart-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid var(--border);
    }
    .cart-item-name { font-weight: 500; font-size: 16px; }
    .cart-item-price { color: var(--muted); font-size: 14px; margin-top: 2px; }
    .qty-control { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg);
      cursor: pointer; font-size: 16px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .qty-btn:hover { background: var(--border); }
    .qty-num { font-weight: 500; min-width: 20px; text-align: center; }
    .remove-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; padding: 4px 8px; }
    .remove-btn:hover { color: #e11d48; }

    .cart-summary {
      margin-top: 24px; padding: 20px;
      background: rgba(192,132,200,.08);
      border: 1px solid var(--border); border-radius: 16px;
    }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: var(--muted); font-size: 14px; }
    .summary-total { display: flex; justify-content: space-between; font-weight: 600; font-size: 18px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

    .checkout-form { margin-top: 24px; }
    .checkout-form label { display: block; margin-bottom: 14px; font-size: 14px; font-weight: 500; color: var(--muted); }
    .checkout-form input { display: block; width: 100%; margin-top: 6px; }

    #cartFeedback { display:none; margin-top:14px; padding:12px 16px; border-radius:14px; font-size:14px; font-weight:500; }
  </style>
</head>
<body>

<header>
  <div class="nav">
    <a class="brand" href="/en/">
      <img src="/LogoVPWoBG.png" alt="VetoProtec" height="80" style="object-fit:contain" />
    </a>
    <div class="nav-right">
      <a class="btn" href="/en/">← Back</a>
    </div>
  </div>
</header>

<main>
  <div class="cart-wrap">
    <h1 class="cart-title">Your cart</h1>

    <div id="cartItems"></div>

    <div id="cartSummary" style="display:none">
      <div class="cart-summary">
        <div id="summaryLines"></div>
        <div class="summary-total">
          <span>Total (excl. shipping)</span>
          <span id="totalAmount"></span>
        </div>
      </div>

      <div class="checkout-form">
        <h2 style="font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:16px">Your details</h2>
        <label>Full name / Practice
          <input type="text" id="customerName" placeholder="Veterinary clinic…" required />
        </label>
        <label>Email
          <input type="email" id="customerEmail" placeholder="you@example.com" required />
        </label>
      </div>

      <div id="cartFeedback"></div>

      <div class="cta" style="margin-top:20px">
        <button class="btn primary" id="checkoutBtn" onclick="checkout()">Proceed to payment →</button>
        <a class="btn" href="/en/">Continue shopping</a>
      </div>
    </div>

    <div id="cartEmpty" class="cart-empty" style="display:none">
      <p>Your cart is empty.</p>
      <a class="btn primary" href="/en/#products" style="margin-top:16px;display:inline-block">View products</a>
    </div>

  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-inner">
      <div>© <span id="y"></span> VetoProtec</div>
      <div class="footer-links">
        <a href="/mentions-legales.html">Legal notice</a>
        <a href="/cgv.html">Terms & Conditions</a>
      </div>
    </div>
  </div>
</footer>

<script>
document.getElementById("y").textContent = new Date().getFullYear();

const PRODUCTS = {
  petholder: { name: 'PetHolder', price: 55.00 },
  petanesth: { name: 'PetAnesth', price: 115.00 },
};

function getCart() {
  try { return JSON.parse(sessionStorage.getItem('vp_cart') || '{}'); }
  catch { return {}; }
}

function saveCart(cart) {
  sessionStorage.setItem('vp_cart', JSON.stringify(cart));
  renderCart();
}

function renderCart() {
  const cart = getCart();
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  const itemsEl = document.getElementById('cartItems');
  const summaryEl = document.getElementById('cartSummary');
  const emptyEl = document.getElementById('cartEmpty');

  if (keys.length === 0) {
    itemsEl.innerHTML = '';
    summaryEl.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }

  emptyEl.style.display = 'none';
  summaryEl.style.display = 'block';

  let total = 0;
  let summaryLines = '';
  itemsEl.innerHTML = keys.map(productId => {
    const product = PRODUCTS[productId];
    const qty = cart[productId];
    const subtotal = product.price * qty;
    total += subtotal;
    summaryLines += `<div class="summary-row"><span>${product.name} x${qty}</span><span>${subtotal.toFixed(2)} €</span></div>`;
    return `
      <div class="cart-item">
        <div>
          <div class="cart-item-name">${product.name}</div>
          <div class="cart-item-price">${product.price.toFixed(2)} € / unit</div>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <div class="qty-control">
            <button class="qty-btn" onclick="updateQty('${productId}', -1)">−</button>
            <span class="qty-num">${qty}</span>
            <button class="qty-btn" onclick="updateQty('${productId}', 1)">+</button>
          </div>
          <button class="remove-btn" onclick="removeItem('${productId}')" title="Remove">✕</button>
        </div>
      </div>`;
  }).join('');

  document.getElementById('summaryLines').innerHTML = summaryLines;
  document.getElementById('totalAmount').textContent = total.toFixed(2) + ' €';
}

function updateQty(productId, delta) {
  const cart = getCart();
  cart[productId] = (cart[productId] || 0) + delta;
  if (cart[productId] <= 0) delete cart[productId];
  saveCart(cart);
}

function removeItem(productId) {
  const cart = getCart();
  delete cart[productId];
  saveCart(cart);
}

async function checkout() {
  const cart = getCart();
  const name = document.getElementById('customerName').value.trim();
  const email = document.getElementById('customerEmail').value.trim();
  const feedback = document.getElementById('cartFeedback');
  const btn = document.getElementById('checkoutBtn');

  if (!name || !email) {
    feedback.textContent = '⚠️ Please fill in your name and email.';
    feedback.style.cssText = 'background:#fef9c3;color:#854d0e;border:1px solid #fde68a;display:block;margin-top:14px;padding:12px 16px;border-radius:14px;font-size:14px;font-weight:500';
    return;
  }

  const items = Object.entries(cart).map(([productId, quantity]) => ({ productId, quantity }));

  btn.textContent = 'Redirecting…';
  btn.disabled = true;
  feedback.style.display = 'none';

  try {
    const res = await fetch('/api/create-payment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items, customerEmail: email, customerName: name }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Payment error');
    sessionStorage.removeItem('vp_cart');
    if (data.paymentId) sessionStorage.setItem('vp_payment_id', data.paymentId);
    window.location.href = data.checkoutUrl;
  } catch (err) {
    feedback.textContent = '❌ ' + (err.message || 'Something went wrong. Please try again.');
    feedback.style.cssText = 'background:#fef2f2;color:#991b1b;border:1px solid #fecaca;display:block;margin-top:14px;padding:12px 16px;border-radius:14px;font-size:14px;font-weight:500';
    btn.textContent = 'Proceed to payment →';
    btn.disabled = false;
  }
}

renderCart();
</script>

</body>
</html>
